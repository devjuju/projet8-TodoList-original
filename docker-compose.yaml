services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: todolist-original-php

    ports:
      - "8067:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    platform: linux/amd64

    container_name: todolist-original-db

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todolist

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin

    container_name: todolist-original-phpmyadmin

    restart: unless-stopped

    depends_on:
      - mysql

    ports:
      - "8068:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  mysql_data:
